<mat-card class="cardWithShadow theme-card">

    <mat-card-header>

        <div class="header-container">

            <mat-card-title class="m-b-0">
                Attribute Values
            </mat-card-title>

            @if (!AttributeValue_Forms) {
            <button mat-flat-button color="primary" (click)="AddNewUser()">
                Add New Value
            </button>
            }

        </div>

    </mat-card-header>

    @if (!AttributeValue_Forms) {
    <mat-card-content class="b-t-1">

        <app-mat-table [columns]="tableColumns" [tableData]="AttributeValues" [showAction]="true" [showView]="true" [Extra_Column]="false"
            (editClick)="editUser($event)" (deleteClick)="deleteUser($event)" (ViewClick)="viewItem($event)">
        </app-mat-table>

    </mat-card-content>
    }
    @else {
    <mat-card-content class="b-t-1">

        <form [formGroup]="AttributeValueForm">
            <div class="row">
                <div class="col-lg-4">
                    <mat-label class="f-w-600 m-b-8 d-block">Attribute</mat-label>
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-select formControlName="ProductAttributeId" placeholder="Select Attribute">
                            @for(option of ProductAttributes; track option.Id) {
                            <mat-option [value]="option.Id">{{option.Name}}</mat-option>
                            }
                        </mat-select>
                    </mat-form-field>
                </div>

                <div class="col-lg-4">
                    <mat-label class="f-w-600 m-b-8 d-block">Value Code</mat-label>
                    <mat-form-field appearance="outline" class="w-100">
                        <input matInput formControlName="AttributeValueCode" placeholder="Enter Value Code">
                    </mat-form-field>
                </div>

                <div class="col-lg-4">
                    <mat-label class="f-w-600 m-b-8 d-block">Name</mat-label>
                    <mat-form-field appearance="outline" class="w-100">
                        <input matInput formControlName="Name" placeholder="Enter Value Name">
                    </mat-form-field>
                </div>
            </div>

            <div class="m-t-12">
                <button mat-stroked-button class="me-3 Cancel_Button" (click)="cancelAttributeValue()">
                    Cancel
                </button>
                <button mat-flat-button color="primary" (click)="submit(AttributeValueForm)">
                    {{Update_button ? 'Update' : 'Submit'}}
                </button>
            </div>
        </form>

    </mat-card-content>
    }

</mat-card>
