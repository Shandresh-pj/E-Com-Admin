<mat-card class="cardWithShadow theme-card">
  <mat-card-header>
    <mat-card-title class="m-b-0">Password Change</mat-card-title>
  </mat-card-header>
  <mat-card-content class="b-t-1">
    <form [formGroup]="PasswordChange">
      <div class="row">
        <div class="col-lg-4">
          <!-- input -->
          <mat-label class="f-w-600 m-b-8 d-block">Email</mat-label>
          <mat-form-field appearance="outline" class="w-100" color="primary">
            <input matInput type="email" formControlName="email" placeholder="your email" />
            @if (!otpSent) {

            <button mat-button matSuffix type="button" (click)="SendOtp()">

              Send OTP

            </button>

            } @else {

            <span matSuffix class="countdown">

              {{ countdown }}s

            </span>

            }
          </mat-form-field>
        </div>

        <div class="col-lg-4">
          <!-- input -->
          <mat-label class="f-w-600 m-b-8 d-block">Verify Otp</mat-label>
          <mat-form-field appearance="outline" class="w-100" color="primary">
            <input matInput type="email" formControlName="otp" placeholder="Enter Otp" />
          </mat-form-field>
        </div>

        <div class="col-lg-4">
          <!-- input -->
          <mat-label class="f-w-600 m-b-8 d-block">Password</mat-label>
          <mat-form-field appearance="outline" class="w-100" color="primary">
            <input matInput type="password" formControlName="password" placeholder="your password" />
          </mat-form-field>
        </div>

      </div>

      <div class="m-t-12">
        <button mat-flat-button color="primary" class="m-r-8">Submit</button>
        <button mat-stroked-button color="warn">Cancel</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
