<div class="row">
  <div class="col-lg-12">
    <mat-card class="cardWithShadow overflow-hidden">
      <mat-card-header class="d-flex align-items-center justify-content-between p-24 bg-light-primary">
        <mat-card-title class="m-b-0">Notification Center</mat-card-title>
        <button mat-flat-button color="primary" *ngIf="notifications.length > 0" (click)="markAllAsRead()">
          <mat-icon>check_circle</mat-icon> Mark All as Read
        </button>
      </mat-card-header>

      <mat-card-content class="p-24">
        <div *ngIf="loading" class="text-center p-y-24">
          <p class="text-muted">Loading notifications...</p>
        </div>

        <div *ngIf="!loading && notifications.length === 0" class="text-center p-y-48">
          <mat-icon style="font-size: 48px; width: 48px; height: 48px;" class="text-muted">notifications_off</mat-icon>
          <h4 class="m-t-16 text-muted">No notifications found</h4>
          <p class="text-muted">You're all caught up!</p>
        </div>

        <div *ngIf="!loading && notifications.length > 0" class="notification-list">
          <div *ngFor="let item of notifications" 
               [class.unread]="!item.is_read" 
               (click)="markAsRead(item)" 
               class="notification-item d-flex align-items-center justify-content-between p-16 m-b-12 rounded border">
            
            <div class="d-flex align-items-center">
              <div class="icon-wrapper m-r-16 rounded-circle d-flex align-items-center justify-content-center p-8"
                   [ngClass]="item.is_read ? 'bg-light' : 'bg-light-primary'">
                <mat-icon [class]="getClassForType(item.type)">{{ getIconForType(item.type) }}</mat-icon>
              </div>
              <div>
                <span class="d-block f-w-600 f-s-14" [ngClass]="item.is_read ? 'text-muted' : 'text-dark'">
                  {{ item.message }}
                </span>
                <span class="d-block text-muted f-s-12 m-t-4">
                  {{ item.created_at | date:'medium' }}
                </span>
              </div>
            </div>

            <div class="actions">
              <button mat-icon-button *ngIf="!item.is_read" (click)="markAsRead(item); $event.stopPropagation()" title="Mark as read">
                <mat-icon color="primary">done</mat-icon>
              </button>
              <mat-icon *ngIf="item.is_read" class="text-success" title="Read">done_all</mat-icon>
            </div>
            
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
