<div class="w-100 h-100 d-flex flex-column position-relative z-index-2">
  <div class="d-flex align-items-center justify-content-between p-24 pb-0">
    <div>
      <h3 class="f-w-700 m-b-0 f-s-16 text-dark">Product Sales</h3>
      <p class="f-s-13 text-muted m-t-4 m-b-0">Total revenue this month</p>
    </div>
    <div class="bg-light-error text-error p-12 rounded-circle shadow-sm">
      <mat-icon class="icon-24">payments</mat-icon>
    </div>
  </div>
  
  <div class="px-4 mt-3">
    <h2 class="f-w-800 m-b-0 f-s-24">$6,820</h2>
    <div class="d-flex align-items-center gap-8 m-t-8">
      <span class="badge bg-light-error text-error fw-bold d-flex align-items-center px-2 py-1 border rounded-pill">
        <mat-icon class="icon-14 m-r-4">trending_down</mat-icon> -4%
      </span>
      <span class="f-s-12 text-muted fw-bold">vs last month</span>
    </div>
  </div>
  
  <div class="flex-grow-1 p-24 pt-16 position-relative z-index-1 mt-auto">
    <apx-chart [series]="productsalesChart.series" [dataLabels]="productsalesChart.dataLabels"
        [chart]="productsalesChart.chart" [legend]="productsalesChart.legend" [colors]="productsalesChart.colors"
        [stroke]="productsalesChart.stroke" [tooltip]="productsalesChart.tooltip"
        [plotOptions]="productsalesChart.plotOptions" [responsive]="productsalesChart.responsive"></apx-chart>
  </div>
</div>
