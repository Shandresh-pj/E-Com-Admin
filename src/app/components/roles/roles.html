<mat-card class="cardWithShadow theme-card">

    <mat-card-header>

        <div class="header-container">

            <mat-card-title class="m-b-0">
                Roles Access
            </mat-card-title>



        </div>

    </mat-card-header>

    <mat-card-content class="b-t-1">

        <form [formGroup]="RolesForm">

            <div class="row">

                <div class="col-lg-4">
                    <mat-label class="f-w-600 m-b-8 d-block">Roles Name <span class="text-danger">*</span></mat-label>
                    <mat-form-field appearance="outline" class="w-100">
                        <input matInput formControlName="name" placeholder="Enter Role Name">
                        @if (RolesForm.get('name')?.hasError('required')) {
                          <mat-error>Role name is required</mat-error>
                        } @else if (RolesForm.get('name')?.hasError('maxlength')) {
                          <mat-error>Role name cannot exceed 100 characters</mat-error>
                        }
                    </mat-form-field>
                </div>

            </div>

            <div class="m-t-12">

                <button mat-stroked-button class="me-3 Cancel_Button" (click)="cancelRoles()">

                    Cancel

                </button>

                <button mat-flat-button color="primary" (click)="onsubmit(RolesForm)">

                     Submit

                </button>

            </div>

        </form>

    </mat-card-content>

    <mat-card-content class="b-t-1">

        <app-mat-table [columns]="tableColumns" [tableData]="Roles" [showAction]="false" [Extra_Column]="false">
        </app-mat-table>

    </mat-card-content>



</mat-card>
