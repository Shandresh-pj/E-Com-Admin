<mat-card class="cardWithShadow traffic-card">
  <mat-card-content class="traffic-card-body">

    <!-- Header Row -->
    <div class="traffic-header">
      <div class="traffic-header-left">
        <div class="traffic-title-row">
          <span class="traffic-title">Traffic Distribution</span>
          <span class="traffic-live-badge">
            <span class="live-dot"></span>Live
          </span>
        </div>
        <div class="traffic-revenue">$36,358</div>
        <div class="traffic-growth">
          <span class="growth-chip">
            <i-tabler name="trending-up" class="icon-13 d-flex"></i-tabler>
            +9%
          </span>
          <span class="growth-label">vs last year</span>
        </div>
      </div>

      <!-- Radial Chart -->
      <div class="traffic-chart-wrap">
        <apx-chart
          [series]="trafficdistributionChart.series"
          [labels]="trafficdistributionChart.labels"
          [dataLabels]="trafficdistributionChart.dataLabels"
          [chart]="trafficdistributionChart.chart"
          [legend]="trafficdistributionChart.legend"
          [colors]="trafficdistributionChart.colors"
          [stroke]="trafficdistributionChart.stroke"
          [tooltip]="trafficdistributionChart.tooltip"
          [plotOptions]="trafficdistributionChart.plotOptions"
          [responsive]="trafficdistributionChart.responsive">
        </apx-chart>
      </div>
    </div>

    <!-- Channel breakdown bars -->
    <div class="traffic-channels">

      <div class="traffic-channel-row">
        <div class="channel-meta">
          <span class="channel-dot" style="background: #4f46e5;"></span>
          <span class="channel-name">Organic</span>
        </div>
        <div class="channel-bar-wrap">
          <div class="channel-bar">
            <div class="channel-bar-fill organic" [style.width]="trafficdistributionChart.series[0] + '%'"></div>
          </div>
          <span class="channel-pct">{{ trafficdistributionChart.series[0] }}%</span>
        </div>
      </div>

      <div class="traffic-channel-row">
        <div class="channel-meta">
          <span class="channel-dot" style="background: #ec4899;"></span>
          <span class="channel-name">Referral</span>
        </div>
        <div class="channel-bar-wrap">
          <div class="channel-bar">
            <div class="channel-bar-fill referral" [style.width]="trafficdistributionChart.series[1] + '%'"></div>
          </div>
          <span class="channel-pct">{{ trafficdistributionChart.series[1] }}%</span>
        </div>
      </div>

      <div class="traffic-channel-row">
        <div class="channel-meta">
          <span class="channel-dot" style="background: #10b981;"></span>
          <span class="channel-name">Social</span>
        </div>
        <div class="channel-bar-wrap">
          <div class="channel-bar">
            <div class="channel-bar-fill social" [style.width]="trafficdistributionChart.series[2] + '%'"></div>
          </div>
          <span class="channel-pct">{{ trafficdistributionChart.series[2] }}%</span>
        </div>
      </div>

    </div>

  </mat-card-content>
</mat-card>
