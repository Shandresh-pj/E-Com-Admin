<mat-card class="cardWithShadow">
  <mat-card-header class="d-flex justify-content-between align-items-center p-24">
    <mat-card-title>Workforce Requests</mat-card-title>
    <div class="actions">
      <button mat-flat-button color="primary">
        <i-tabler name="plus" class="icon-18 m-r-4"></i-tabler> New Request
      </button>
    </div>
  </mat-card-header>
  <mat-card-content class="p-24 p-t-0">
    <div class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="w-100">
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 p-l-0">Request ID</th>
          <td mat-cell *matCellDef="let element" class="p-l-0">
            <span class="f-w-500 text-muted f-s-14">{{ element.id }}</span>
          </td>
        </ng-container>

        <!-- Employee Name Column -->
        <ng-container matColumnDef="employeeName">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">Employee Name</th>
          <td mat-cell *matCellDef="let element">
            <div class="d-flex align-items-center">
              <span class="f-w-600 f-s-15">{{ element.employeeName }}</span>
            </div>
          </td>
        </ng-container>

        <!-- Type Column -->
        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">Type</th>
          <td mat-cell *matCellDef="let element">
            <span class="f-w-500 f-s-14">{{ element.type }}</span>
          </td>
        </ng-container>

        <!-- Date Column -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">Date</th>
          <td mat-cell *matCellDef="let element">
            <span class="f-w-500 text-muted f-s-14">{{ element.date }}</span>
          </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">Status</th>
          <td mat-cell *matCellDef="let element">
            <span [class]="'p-x-8 p-y-4 item-chip f-w-500 rounded-pill ' + getStatusColor(element.status)">
              {{ element.status }}
            </span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">Actions</th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary">
              <i-tabler name="eye" class="icon-18"></i-tabler>
            </button>
            <button mat-icon-button color="warn">
              <i-tabler name="trash" class="icon-18"></i-tabler>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
