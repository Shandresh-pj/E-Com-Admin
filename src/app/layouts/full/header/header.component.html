<mat-toolbar class="topbar">

  <!-- Mobile Menu Toggle -->
  @if(showToggle) {
    <button mat-icon-button (click)="toggleMobileNav.emit()" class="mobile-toggle-btn" aria-label="Toggle navigation">
      <i-tabler name="menu-2" class="icon-20 d-flex"></i-tabler>
    </button>
  }

  <!-- Tagline -->
  <div class="topbar-title d-none d-md-flex align-items-center gap-8 ms-4">
    <span class="topbar-brand-dot"></span>
    <span class="topbar-tagline">Enterprise Command Center</span>
  </div>

  <span class="flex-1-auto"></span>

  <!-- Right Action Group -->
  <div class="topbar-actions d-flex align-items-center gap-8">

    <!-- Theme Toggle -->
    <div class="topbar-action-pill">
      <app-theme-toggle class="d-flex align-items-center justify-content-center"></app-theme-toggle>
    </div>

    <!-- Notifications Bell -->
    <button mat-icon-button [matMenuTriggerFor]="notifMenu" class="topbar-icon-btn" aria-label="Notifications">
      <div class="notif-btn-inner">
        <i-tabler class="d-flex icon-20" name="bell"></i-tabler>
        <span class="notif-dot" aria-hidden="true"></span>
      </div>
    </button>

    <mat-menu #notifMenu="matMenu" class="notif-menu-panel" xPosition="before">
      <div class="notif-menu-header px-16 py-12" (click)="$event.stopPropagation()">
        <span class="notif-menu-title">Notifications</span>
        <span class="notif-badge-count">1 new</span>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item class="notif-item">
        <div class="notif-item-icon notif-icon-info">
          <i-tabler name="info-circle" class="icon-16 d-flex"></i-tabler>
        </div>
        <div class="notif-item-content">
          <span class="notif-item-title">System ready</span>
          <span class="notif-item-time">Just now</span>
        </div>
      </button>
      <div class="notif-footer px-16 py-10">
        <a class="notif-view-all" [routerLink]="['/components/notifications']">View all notifications →</a>
      </div>
    </mat-menu>

    <!-- Profile Button -->
    <button class="profile-avatar-btn" [matMenuTriggerFor]="profilemenu" aria-label="Profile menu">
      <div class="avatar-circle">
        <span class="avatar-initials">A</span>
      </div>
      <div class="avatar-info d-none d-lg-flex">
        <span class="avatar-name">Admin</span>
        <span class="avatar-role">Super Admin</span>
      </div>
      <i-tabler name="chevron-down" class="icon-14 d-flex avatar-chevron d-none d-lg-flex"></i-tabler>
    </button>

    <mat-menu #profilemenu="matMenu" class="profile-menu-panel" xPosition="before">
      <div class="profile-menu-header" (click)="$event.stopPropagation()">
        <div class="profile-menu-avatar"><span>A</span></div>
        <div>
          <p class="profile-menu-name">Admin User</p>
          <p class="profile-menu-role">Super Admin</p>
        </div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="ProfilePage()" class="profile-menu-item">
        <i-tabler name="user" class="icon-16 d-flex menu-item-icon"></i-tabler>
        <span>My Profile</span>
      </button>
      <button mat-menu-item [routerLink]="['/components/change-password']" class="profile-menu-item">
        <i-tabler name="lock" class="icon-16 d-flex menu-item-icon"></i-tabler>
        <span>Change Password</span>
      </button>
      <button mat-menu-item [routerLink]="['/components/notifications']" class="profile-menu-item">
        <i-tabler name="bell" class="icon-16 d-flex menu-item-icon"></i-tabler>
        <span>Notifications</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()" class="profile-menu-item logout-item">
        <i-tabler name="logout" class="icon-16 d-flex menu-item-icon"></i-tabler>
        <span>Sign Out</span>
      </button>
    </mat-menu>

  </div>

</mat-toolbar>
